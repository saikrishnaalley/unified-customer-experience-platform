<template>
    <lightning-card title="Customer 360" icon-name="standard:account">
        <template if:true={error}>
            <p class="slds-p-around_medium slds-text-color_error">{error}</p>
        </template>

        <template if:true={account}>
            <div class="slds-p-around_medium">
                <p><strong>Account:</strong> {account.Name}</p>
                <p><strong>Industry:</strong> {account.Industry}</p>
                <p><strong>Phone:</strong> {account.Phone}</p>
            </div>

            <div class="slds-p-around_medium">
                <h3 class="slds-text-heading_small">Opportunities</h3>
                <template for:each={opportunities} for:item="opp">
                    <p key={opp.Id}>{opp.Name} — {opp.StageName} — ${opp.Amount}</p>
                </template>
            </div>

            <div class="slds-p-around_medium">
                <h3 class="slds-text-heading_small">Orders</h3>
                <template for:each={orders} for:item="ord">
                    <p key={ord.Id}>{ord.OrderNumber} — {ord.Status} — ${ord.TotalAmount}</p>
                </template>
            </div>

            <div class="slds-p-around_medium">
                <h3 class="slds-text-heading_small">Shipments</h3>
                <template for:each={shipments} for:item="ship">
                    <p key={ship.Id}>
                        Order {ship.Order__r.OrderNumber} — {ship.Status__c} via {ship.Carrier__c}
                        (Tracking: {ship.Tracking_Number__c})
                    </p>
                </template>
            </div>
        </template>
    </lightning-card>
</template>
